<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻页数字时钟</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <canvas id="clockCanvas"></canvas>
    
    <div class="settings">
      <button class="settings-btn" id="settingsBtn">⚙️</button>
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-section">
          <div class="settings-title">🎨 主题</div>
          <div class="theme-options">
            <button class="theme-option active" data-theme="classic">⬛ 经典</button>
            <button class="theme-option" data-theme="dark">🌙 暗黑</button>
            <button class="theme-option" data-theme="light">☀️ 明亮</button>
            <button class="theme-option" data-theme="ocean">🌊 海洋</button>
            <button class="theme-option" data-theme="sunset">🌅 日落</button>
            <button class="theme-option" data-theme="custom">🎨 自定义</button>
          </div>
        </div>
        
        <div class="settings-section">
          <div class="settings-title">✨ 动画</div>
          <div class="animation-options">
            <button class="animation-option active" data-animation="flip">📖 翻页</button>
            <button class="animation-option" data-animation="slide">⬆️ 滑动</button>
            <button class="animation-option" data-animation="fade">🔄 淡入</button>
            <button class="animation-option" data-animation="zoom">🔍 缩放</button>
            <button class="animation-option" data-animation="rotate">🔄 旋转</button>
          </div>
        </div>
        
        <div class="settings-section" id="customColors" style="display: none;">
          <div class="settings-title">🖌️ 自定义颜色</div>
          <div class="color-options">
            <div class="color-option">
              <input type="color" id="foregroundColor" value="#333333">
              <span>前景</span>
            </div>
            <div class="color-option">
              <input type="color" id="backgroundColor" value="#1a1a1a">
              <span>背景</span>
            </div>
            <div class="color-option">
              <input type="color" id="digitColor" value="#ffffff">
              <span>数字</span>
            </div>
            <div class="color-option">
              <input type="color" id="separatorColor" value="#888888">
              <span>分隔</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
